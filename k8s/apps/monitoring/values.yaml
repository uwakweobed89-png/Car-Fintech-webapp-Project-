# CRDs installed once directly (kubectl apply --server-side, outside ArgoCD's
# management) — the chart's own last-applied-configuration annotation exceeds
# kubectl's 262144-byte limit for several of these CRDs, and having ArgoCD's
# controller track ~10 large CRDs alongside the rest of the stack was pushing
# it into repeated OOMKills on this cluster's unsized application-controller.
crds:
  enabled: false

# Fargate has no visible nodes for a DaemonSet to run on — disable it.
nodeExporter:
  enabled: false

prometheus:
  prometheusSpec:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    serviceMonitorSelectorNilUsesHelmValues: false

grafana:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  service:
    type: ClusterIP
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      # The sidecar's own default LABEL_VALUE is "1", but the dashboard
      # ConfigMap (dashboards/car-fintech-dashboard.yaml) labels itself
      # grafana_dashboard: "true" -- without pinning this, the sidecar never
      # matches it and only loads the chart's bundled default dashboards.
      labelValue: "true"
      searchNamespace: monitoring

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
